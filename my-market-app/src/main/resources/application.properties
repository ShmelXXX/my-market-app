spring.application.name=my-market-app

spring.datasource.url=jdbc:h2:mem:mymarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Payment service
payment.service.url=http://localhost:8081

# Redis
spring.redis.host=localhost
spring.redis.port=6379
spring.cache.type=redis

# Server
server.port=8080

server.tomcat.uri-encoding=UTF-8
spring.http.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# OAuth2 Client Configuration
spring.security.oauth2.client.registration.my-market-client.provider=keycloak
spring.security.oauth2.client.registration.my-market-client.client-id=my-market-app
spring.security.oauth2.client.registration.my-market-client.client-secret=secret
spring.security.oauth2.client.registration.my-market-client.scope=openid,profile,email
spring.security.oauth2.client.registration.my-market-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.my-market-client.redirect-uri=http://localhost:8080/login/oauth2/code/my-market-client

spring.security.oauth2.client.registration.payment-client.provider=keycloak
spring.security.oauth2.client.registration.payment-client.client-id=payment-client
spring.security.oauth2.client.registration.payment-client.client-secret=${PAYMENT_CLIENT_SECRET}
spring.security.oauth2.client.registration.payment-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.payment-client.scope=payment:read,payment:write

# Provider configuration
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/my-market-realm
spring.security.oauth2.client.provider.keycloak.authorization-uri=http://localhost:8180/realms/my-market-realm/protocol/openid-connect/auth
spring.security.oauth2.client.provider.keycloak.token-uri=http://localhost:8180/realms/my-market-realm/protocol/openid-connect/token
spring.security.oauth2.client.provider.keycloak.user-info-uri=http://localhost:8180/realms/my-market-realm/protocol/openid-connect/userinfo
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=http://localhost:8180/realms/my-market-realm/protocol/openid-connect/certs
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# ========== DEBUG LOGGING ==========
# Spring Security
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=DEBUG
logging.level.org.springframework.security.config=DEBUG

logging.level.ru.yandex.practicum.mymarket=DEBUG

# Web
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG

# Logging
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG

#  Hibernate
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type=TRACE
logging.level.org.hibernate.stat=DEBUG

# CSRF
logging.level.org.springframework.security.web.csrf=DEBUG

# add secrets
spring.profiles.include=secret