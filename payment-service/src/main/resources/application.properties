# payment-service/src/main/resources/application.properties
spring.application.name=payment-service

# R2DBC Configuration
spring.r2dbc.url=r2dbc:h2:mem:///paymentdb?options=DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.r2dbc.username=sa
spring.r2dbc.password=

# ????????????? ?? ??? R2DBC ? Spring Boot 4.0
spring.r2dbc.init.mode=always
spring.r2dbc.init.schema-locations=classpath:schema.sql

# Connection pool
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20
spring.r2dbc.pool.max-idle-time=30m

# Server
server.port=8081

# Logging
logging.level.org.springframework.data.r2dbc=DEBUG
logging.level.io.r2dbc=DEBUG
logging.level.org.springframework.r2dbc=DEBUG